name: Build AthenaT .exe

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install huggingface-hub
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download Whisper model
        run: |
          python -c "from huggingface_hub import snapshot_download; snapshot_download('Systran/faster-whisper-small', cache_dir='hf_home')"

      - name: Build .exe with PyInstaller
        shell: cmd
        run: |
          pyinstaller --onefile --windowed --name "AthenaT" ^
            --add-data "hf_home;hf_home" ^
            --hidden-import PyQt5.sip ^
            --hidden-import ctranslate2 ^
            --hidden-import faster_whisper ^
            --hidden-import tokenizers ^
            --collect-submodules faster_whisper ^
            app/app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AthenaT-windows-x64
          path: dist/AthenaT.exe
